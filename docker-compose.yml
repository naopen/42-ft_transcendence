version: '3.8'

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ft_transcendence_nginx
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend
    networks:
      - transcendence-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ft_transcendence_backend
    expose:
      - "3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./data:/app/data
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=/app/data/transcendence.db
      - JWT_SECRET=${JWT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - USE_HTTPS=${USE_HTTPS}
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}
      - HOST=0.0.0.0
    networks:
      - transcendence-network
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ft_transcendence_frontend
    expose:
      - "5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_WS_URL=${VITE_WS_URL}
      - USE_HTTPS=${USE_HTTPS}
    networks:
      - transcendence-network
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    container_name: ft_transcendence_redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - transcendence-network

networks:
  transcendence-network:
    driver: bridge

volumes:
  redis-data:
